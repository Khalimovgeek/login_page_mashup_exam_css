<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body {
            background: linear-gradient(to bottom, rgba(135, 65, 255, 0.5), rgba(221, 139, 31, 0.818));
            margin: 0;
            font-family: sans-serif;
            text-transform: capitalize;

        }
        .form{
            display: flex;
            flex-direction: column;
            justify-content: center;
            margin-left: 50%;
            padding-left: 5%;
            padding-right: 5%;
            background-color: white;
            height: 100vh;
            
        }
        #login{
            display: flex;
            flex-direction: column;

            
        }
        #login h3{
            font-size: 25px;
            
            color: rgb(255, 111, 15);

        }
        #login input[type = "email"],#login input[type = "password"]{
            height: 25px;
            margin-top: 10px;
            margin-bottom: 10px;
            
        }
        #login input[type = "submit"]{
            color: white;
            background-color: rgb(255, 111, 15);
            border: none;
            height: 30px;
            font-size: medium;
        }
        input[type ="checkbox"]{
            margin-bottom: 10px;
        }
        @media only screen and (max-width : 600px){
            .form{
                margin-left: 0;
            }
        }
    </style>
</head>
<body>
    <div class="form">
        
        <form action="#" id="login" method="get">
            <h3>Login Form</h3>
            <label for="email">Email :</label>
            <input type="email" name="email" id="email">
            <label for="password">Password :</label>
            <input type="password" name="password" id="password">
            <span><input type="checkbox" name="remember" id="remember"><label for="remember">Remember me</label></span>
            <input type="submit" value="Login">
        </form>
    </div>
</body>
</html>
