<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link to Button</title>
    <style>
        div{
            display: flex;
            flex-direction: column;
            align-items: center;

        }
        h3{
            font-size: larger;
            font-family: sans-serif;

        }
        p{
            text-align: left;
            font-size: large;
            font-family: sans-serif;
        }
        a{
            margin-top: 30%;
            width: 100px;
            text-decoration: none;
            color: white;
            border-radius: 20px;
            padding: 15px 50px;
            font-family: 'Courier New', Courier, monospace;
            font-size: medium;
            background: linear-gradient(to bottom right, rgb(253, 2, 2),rgb(248, 128, 128));
        }
        a:hover{
            padding: 16px 55px;
            opacity: .8;
        }
    </style>
</head>
<body>
    <div>
        <h3>Mashup Stack</h3>
        <p>Click here to go to mashupstack</p>
        <a href="https://www.mashupstack.com/">click here</a>

    </div>
    </body>
</html>
