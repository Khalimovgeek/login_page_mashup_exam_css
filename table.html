<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>

    <style>
        body{
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: center;
            
        }
        table{
            
            border-color: black;
            border-collapse: collapse;
            background-color: gray;
            color: white;
        }
        th{
            width: 300px;
            text-align: center;
            font-size: medium;
            padding: 10px;
            text-transform: uppercase;
        }

    </style>
</head>
<body>

    <h2>Price Table</h2>
    <table border="1">
        <tr>
            <th>ID</th>
            <th>Product Name</th>
            <th>Product prize</th>
        </tr>
        <tr>
            <td>1001</td>
            <td>Mazda RX 7</td>
            <td>&dollar;250k</td>
        </tr>
        <tr>
            <td>1002</td>
            <td>Nissan GTR-35 </td>
            <td>&dollar;200k</td>
        </tr>
        <tr>
            <td>1003</td>
            <td>BMW M340i</td>
            <td>&dollar;100k</td>
        </tr>
        <tr>
            <td>1004</td>
            <td>BMW F80 M3</td>
            <td>&dollar;67k</td>
        </tr>
        <tr>
            <td>1005</td>
            <td>Audi RS8</td>
            <td>&dollar;90k</td>
        </tr>
    </table>
</body>
</html>
