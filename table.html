<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>

    <style>
        body{
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: center;
            
        }
        table{
            
            border-color: black;
            border-collapse: collapse;
        }
        th{
            width: 300px;
            background-color: grey;
            color: rgb(255, 255, 255);
            text-align: center;
            font-size: medium;
            padding: 10px;
        }

    </style>
</head>
<body>

    <h2>Price Table</h2>
    <table border="1">
        <tr>
            <th>ID</th>
            <th>Product Name</th>
            <th>Product prize</th>
        </tr>
        <tr>
            <th>1001</th>
            <th>Mazda RX 7</th>
            <th>&dollar;250k</th>
        </tr>
        <tr>
            <th>1002</th>
            <th>Nissan GTR-35 </th>
            <th>&dollar;200k</th>
        </tr>
    </table>
</body>
</html>
